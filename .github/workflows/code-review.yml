name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Code Review
        uses: brandon-fryslie/zai-coding-agent-review@v1
        with:
          # codex is the engine: the z.ai provider is throttled by a 429 Fair Usage
          # account limit, so we run OpenAI instead. The action picks its engine from
          # PROVIDER alone (a credential does not switch it); declare it explicitly so
          # the choice does not ride on the floating @v1 tag's default.
          # Requires the OPENAI_API_KEY repo secret.
          PROVIDER: codex
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
