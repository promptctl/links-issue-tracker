name: Release smoke

# Fast PR gate for the release path. Builds ONE native target (linux/amd64) with
# goreleaser, so a PR proves the things that break per code change — Go compiles,
# the cgo + ICU link recipe works, and .goreleaser.yml parses — without paying
# for the cross-toolchain.
#
# [LAW:single-enforcer] this workflow owns the *code-level* release invariant
# (does a goreleaser build of this commit produce a binary?); release-validate.yml
# owns the *release-level* invariant (do all five cross-targets + the manifest
# assemble?) and runs out-of-band. Splitting them by change-reason keeps the PR
# feedback loop fast: the 5-platform cross-build is a release-time cost, not a
# per-PR cost, so it must never sit on this path.
#
# linux/amd64 is the native target — CC=gcc, system libicu-dev, no zig, no SDK,
# no /opt/icu prefix (the .goreleaser.yml env block leaves CGO_*FLAGS empty and
# the icu_static tag unset for exactly this target). goreleaser --single-target
# builds only the runner's GOOS/GOARCH, so none of the cross-target env (zig CC,
# /opt/icu paths) is evaluated.

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: release-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # goreleaser derives the snapshot version from git

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # System ICU for the native linux/amd64 cgo link — the same libs the
      # release image's base stage installs. gcc/g++ (with its static
      # libstdc++.a, needed by -static-libstdc++) are already on the runner.
      #
      # Reproduce the static-only ICU lib dir the release image's `final` stage
      # builds, so this PR gate links linux/amd64 by the IDENTICAL static recipe
      # .goreleaser.yml uses (CGO_LDFLAGS=-L/opt/icu/linux_amd64/lib): symlinks
      # to the system libicu *.a, nothing else, so the bare `-licui18n` resolves
      # to the static archive instead of the .so. [LAW:one-type-per-behavior]
      # the smoke build is the same shape as the release build, not a dynamic
      # stand-in that hides a broken static link until release time.
      - name: Install ICU
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libicu-dev pkg-config
          sudo mkdir -p /opt/icu/linux_amd64/lib
          for lib in libicui18n libicuuc libicudata; do
            sudo ln -sf "/usr/lib/x86_64-linux-gnu/${lib}.a" "/opt/icu/linux_amd64/lib/${lib}.a"
            test -f "/opt/icu/linux_amd64/lib/${lib}.a" \
              || { echo "MISSING static archive ${lib}.a (system libicu-dev)" >&2; exit 1; }
          done

      # Same goreleaser major as the release image, so config semantics match.
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "2.16.0"
          install-only: true

      # --single-target builds only linux/amd64 (the runner arch); --snapshot
      # avoids needing a tag. This is the whole point: no cross-build, fast.
      - name: Build native target (snapshot)
        run: goreleaser build --single-target --snapshot --clean

      # Prove the artifact is self-contained, not just that it compiled. The
      # released linux/amd64 binary must run on a clean host with no libicu /
      # libstdc++ installed, so it must NOT carry a NEEDED entry for any of them.
      # readelf asserting their ABSENCE is what would have caught the original
      # dynamically-linked binary (NEEDED libicui18n.so.72) that built green but
      # failed to run. [LAW:verifiable-goals] [LAW:no-silent-failure]
      - name: Assert linux/amd64 binary is self-contained
        run: |
          set -euo pipefail
          BIN=$(find dist -type f -name lit | head -n1)
          test -n "$BIN" || { echo "no lit binary found in dist/" >&2; exit 1; }
          echo "Inspecting $BIN"
          NEEDED=$(readelf -d "$BIN" | grep NEEDED || true)
          echo "$NEEDED"
          if echo "$NEEDED" | grep -qiE 'libicu|libstdc\+\+|libgcc_s'; then
            echo "FAIL: binary dynamically links ICU/libstdc++/libgcc_s; not self-contained" >&2
            exit 1
          fi
          echo "OK: no NEEDED libicu / libstdc++ / libgcc_s"
