name: Release smoke

# Fast PR gate for the release path. Builds ONE target (linux/amd64) with
# goreleaser inside the release-builder image's `smoke` stage, so a PR proves
# the things that break per code change — Go compiles, the cgo + ICU link
# recipe works, .goreleaser.yml parses, and the produced linux binary is the
# fully static musl artifact we actually ship — without paying for the
# five-target cross-build.
#
# [LAW:single-enforcer] this workflow owns the *code-level* release invariant
# (does a goreleaser build of this commit produce a runnable linux binary?);
# release-validate.yml owns the *release-level* invariant (do all five
# cross-targets + the manifest assemble?) and runs out-of-band. Splitting them
# by change-reason keeps the PR feedback loop fast: the 5-platform cross-build
# is a release-time cost, not a per-PR cost, so it must never sit on this path.
#
# The `smoke` Dockerfile stage carries the toolchain plus only the linux/amd64
# ICU prefix. Its layers are shared with the full `final` image (same GHA cache
# scope), so a PR that doesn't touch build/Dockerfile.release loads cached
# layers; a PR that does touch it pays for ONE ICU cross-build, not five.
# [LAW:one-type-per-behavior] the smoke build is the identical recipe the
# release ships (zig cc x86_64-linux-musl, static ICU, -static link) — not a
# native-glibc stand-in that would hide a broken musl link until release time.

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: release-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # goreleaser derives the snapshot version from git

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # setup-go RESTORES a module cache keyed on go.sum; it does not run any
      # `go` command, so on a cold cache GOMODCACHE is empty. The build mounts
      # it :ro into the container, where goreleaser cannot then download the
      # missing modules. Populate it here so the read-only mount is correct by
      # construction. [LAW:one-source-of-truth] this step is the populated
      # GOMODCACHE; the :ro mount consumes it.
      - name: Populate module cache
        run: go mod download

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Same Dockerfile and GHA cache scope as release-validate/release, so the
      # base + native-icu + cross-linux-amd64 layers are typically already
      # populated by a recent master run. [LAW:single-enforcer] the image owns
      # the toolchain inventory; this workflow installs no compilers or ICU of
      # its own.
      - name: Build release-builder smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile.release
          target: smoke
          tags: lit-release-builder:smoke
          load: true
          cache-from: type=gha,scope=release-builder
          cache-to: type=gha,scope=release-builder,mode=max

      # --single-target builds only linux/amd64 (the container arch);
      # --snapshot avoids needing a tag. No cross-build: fast.
      - name: Build linux/amd64 target (snapshot)
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD":/go/src/app -w /go/src/app \
            -v "$(go env GOMODCACHE)":/go/pkg/mod:ro \
            lit-release-builder:smoke \
            build --single-target --snapshot --clean

      # Prove the artifact is the universal static binary we claim to ship, not
      # just that it compiled — and prove it by EXECUTION, on both libcs:
      #   - no PT_INTERP program header and no NEEDED entries (fully static;
      #     this is what would have caught the original glibc-dynamic binary
      #     that built green but could not start on Alpine),
      #   - runs on this glibc (ubuntu) runner,
      #   - runs on a stock Alpine (musl) container.
      # [LAW:verifiable-goals] [LAW:no-silent-failure]
      - name: Assert linux/amd64 binary is static and runs on glibc + musl
        run: |
          set -euo pipefail
          BIN=$(find dist -type f -name lit | head -n1)
          test -n "$BIN" || { echo "no lit binary found in dist/" >&2; exit 1; }
          echo "Inspecting $BIN"
          if readelf -l "$BIN" | grep -q 'INTERP'; then
            echo "FAIL: binary has a PT_INTERP (dynamic loader) entry; not static" >&2
            exit 1
          fi
          if readelf -d "$BIN" | grep -q 'NEEDED'; then
            echo "FAIL: binary has NEEDED dynamic dependencies; not static" >&2
            exit 1
          fi
          echo "OK: no PT_INTERP, no NEEDED — fully static"
          echo "--- execute on glibc host (ubuntu runner)"
          "./$BIN" version
          echo "--- execute on musl host (alpine container)"
          docker run --rm -v "$PWD/$BIN":/usr/local/bin/lit:ro alpine:3.20 lit version
