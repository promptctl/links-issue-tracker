name: build-and-test

# Reusable build+test for a single OS, invoked via `workflow_call`.
#
# [LAW:one-source-of-truth] "how lit is built and tested in CI" is defined here
# exactly once. Callers vary only the runner (`os`); the build command, the
# test command, and the pinned Dolt the suite shells out to do not vary by
# platform. [LAW:one-type-per-behavior] build+test is one behavior; the OS is
# the value crossing the boundary, not a second job type to keep in sync.
#
# Cadence is owned by the callers, never branched on here: ci.yml runs this on
# ubuntu for every PR (fast gate); ci-macos.yml runs it on macOS out-of-band
# (push:master + manual) so the slow cgo build never gates a PR.
on:
  workflow_call:
    inputs:
      os:
        description: Runner to build and test on (e.g. ubuntu-latest, macos-latest)
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # The test suite shells out to the `dolt` CLI as an oracle, so Dolt must
      # be installed to run `go test`. The pinned installer supports Linux and
      # macOS identically — same operation, same version on every platform, so
      # test behavior can't drift between runners. (Dolt is a test-only oracle;
      # it is NOT a runtime dependency of the shipped binary.)
      - name: Install Dolt
        run: |
          set -euo pipefail
          curl -L https://github.com/dolthub/dolt/releases/download/v1.81.10/install.sh -o install-dolt.sh
          sudo bash install-dolt.sh
          dolt version

      - name: Build
        run: go build ./cmd/lit

      - name: Test
        run: go test ./...
