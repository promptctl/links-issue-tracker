name: CI (macOS)

# macOS build+test coverage, kept OFF the PR gate. The embedded Dolt engine
# builds with cgo (ICU/zstd); on macOS that is slow enough to blow the PR
# gate's <5-min budget, so this runs out-of-band: on every push to master and
# on demand. A macOS-only regression is caught post-merge here rather than
# slowing every PR — the same cadence the release cross-build uses.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Same build+test definition as the ubuntu gate; only the runner differs.
  build-and-test:
    uses: ./.github/workflows/build-and-test.yml
    with:
      os: macos-latest
