# goreleaser config for lit.
#
# CONFIG VERSION: goreleaser v2 syntax. `version: 2` below is required —
# release-validate proved it: running without it fails with "only version: 2
# configuration files are supported". The release build runs goreleaser inside
# build/Dockerfile.release, which installs goreleaser v2.16.0 + zig 0.14.0 as
# the single cross-toolchain (a pinned macOS SDK supplies the Apple frameworks
# zig omits, link-only).
#
# CGO is required by gozstd in Dolt; that Dockerfile image owns the per-target C
# toolchains (zig cc for every target: darwin, windows, and linux via musl),
# invoked via the per-target CC env entries below.
#
# [LAW:one-source-of-truth] The version/commit/date a release reports come from
# a single place: the ldflags injected here. internal/version.{Version,Commit,Date}
# are the only sinks; no other code computes those fields.
#
# [LAW:single-enforcer] release-validate.yml is the one place that proves this
# config produces a working release; release.yml is the one place that
# publishes. Same Docker image tag exercises both.

version: 2

project_name: lit

# No `before.hooks` — earlier iterations ran `go mod tidy` here, but that
# can mutate go.mod/go.sum during a tagged release build, so artifacts
# would be built from a working tree that no longer matches the tagged
# commit. [LAW:single-enforcer] tidiness is enforced ONCE, in CI on every
# PR/master push (.github/workflows/ci.yml "go mod tidy check"), BEFORE a
# tag is cut — not at release time when mutation is destructive.

builds:
  - id: lit
    main: ./cmd/lit
    binary: lit
    # CGO is REQUIRED: Dolt's embedded MySQL library (gozstd, the regex build
    # tag) does not build with CGO_ENABLED=0. release.yml runs goreleaser
    # inside the build/Dockerfile.release image, which installs zig 0.14.0 as
    # the single cross-toolchain for every target (darwin arm64/amd64, windows,
    # and linux arm64/amd64 via *musl*, producing fully static universal linux
    # binaries that run on glibc and musl/Alpine hosts alike).
    # Per-target CC/CXX is selected via the template-driven env entries below.
    #
    # [LAW:single-enforcer] One Docker image owns the cross-toolchain inventory;
    # nothing in this repo installs compilers ad-hoc.
    env:
      - CGO_ENABLED=1
      # CC + CXX per target — both required because go-icu-regex has C++ source
      # (file.cpp). Without CXX, Go falls back to the host's default g++ which
      # produces "unrecognized -arch" errors when linking cross-targets.
      # Wrapper scripts installed by build/Dockerfile.release call
      # `zig cc -target <triple>` / `zig c++ -target <triple>` for each target.
      # [LAW:one-source-of-truth] the actual zig target triples live only in
      # the wrapper definitions in Dockerfile.release; these are just names.
      - >-
        {{- if eq .Os "darwin" -}}
          {{- if eq .Arch "arm64" }}CC=zig-cc-aarch64-apple-darwin{{- end -}}
          {{- if eq .Arch "amd64" }}CC=zig-cc-x86_64-apple-darwin{{- end }}
        {{- end -}}
      - >-
        {{- if eq .Os "darwin" -}}
          {{- if eq .Arch "arm64" }}CXX=zig-cxx-aarch64-apple-darwin{{- end -}}
          {{- if eq .Arch "amd64" }}CXX=zig-cxx-x86_64-apple-darwin{{- end }}
        {{- end -}}
      - >-
        {{- if eq .Os "windows" -}}
          {{- if eq .Arch "amd64" }}CC=zig-cc-x86_64-windows-gnu{{- end }}
        {{- end -}}
      - >-
        {{- if eq .Os "windows" -}}
          {{- if eq .Arch "amd64" }}CXX=zig-cxx-x86_64-windows-gnu{{- end }}
        {{- end -}}
      - >-
        {{- if eq .Os "linux" -}}
          {{- if eq .Arch "amd64" }}CC=zig-cc-x86_64-linux-musl{{- end -}}
          {{- if eq .Arch "arm64" }}CC=zig-cc-aarch64-linux-musl{{- end }}
        {{- end -}}
      - >-
        {{- if eq .Os "linux" -}}
          {{- if eq .Arch "amd64" }}CXX=zig-cxx-x86_64-linux-musl{{- end -}}
          {{- if eq .Arch "arm64" }}CXX=zig-cxx-aarch64-linux-musl{{- end }}
        {{- end -}}
      # CGO include + link paths per target — points cgo at the ICU prefix
      # build/Dockerfile.release installs at /opt/icu/<goos>_<goarch>. Every
      # target has the same shape: cross-built static-only ICU prefix, so the
      # bare `-licui18n` go-icu-regex emits can only resolve to the static
      # archive. [LAW:one-type-per-behavior] no per-target exceptions.
      #
      # We set CGO_CPPFLAGS (preprocessor: -I) so the include path applies to
      # BOTH C and C++ source. go-icu-regex has file.cpp; CGO_CFLAGS alone
      # is C-only and would leave the C++ include search path empty (-> the
      # observed "unicode/regex.h not found" failure mode).
      - CGO_CPPFLAGS=-I/opt/icu/{{ .Os }}_{{ .Arch }}/include
      # linux gets `-static`: the targets are musl (see the CC wrappers), and a
      # fully static musl link is the point — no /lib/ld-* interpreter, so the
      # one binary runs on glibc AND musl/Alpine hosts. Stated here explicitly
      # rather than relying on zig's musl default, so the invariant the release
      # smoke asserts (no INTERP, no NEEDED) is declared where it is produced.
      # (Static *glibc* was never an option: its getaddrinfo/NSS dlopen()s at
      # runtime, and Dolt's cloud SDKs need working DNS.)
      - >-
        {{- if eq .Os "linux" -}}
          CGO_LDFLAGS=-L/opt/icu/{{ .Os }}_{{ .Arch }}/lib -static
        {{- else -}}
          CGO_LDFLAGS=-L/opt/icu/{{ .Os }}_{{ .Arch }}/lib
        {{- end -}}
      # icu_static build tag: every target links ICU's STATIC archives, so
      # go-icu-regex's static-link cgo recipe (-DU_STATIC_IMPLEMENTATION) is the
      # one we want everywhere. Every target's ICU is built from source
      # (--enable-static --disable-shared) at /opt/icu/<target>. zig bundles
      # its libc++ statically by default, so no -static-libstdc++/-static-libgcc
      # gcc driver flags are needed (zig cc would reject them).
      - GOFLAGS=-tags=icu_static
    # goos/goarch enumerate every target we know how to build; the active
    # set ships only those NOT in the ignore: block below.
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows on arm64: Dolt's MySQL driver path is exercised on amd64; skip
      # arm64-windows until there is a real consumer to justify the test matrix.
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w
      # [LAW:one-source-of-truth] {{ .Version }} (NOT {{ .Tag }}) used in all
      # three places a version appears: ldflag, archive filename, manifest
      # field. For a tagged release vX.Y.Z, goreleaser's .Version is X.Y.Z
      # (v stripped); for snapshot mode, it's the snapshot template's output
      # (e.g. 0.0.1-snapshot+abc1234). Using one template across all surfaces
      # means the binary's reported version, the archive's version segment,
      # and the manifest's `version` field are bit-identical — no drift.
      # Cosmetic note: `lit version` therefore reports "lit 0.1.0", not
      # "lit v0.1.0" — same convention as kubectl/helm/terraform.
      - -X github.com/promptctl/links-issue-tracker/internal/version.Version={{ .Version }}
      - -X github.com/promptctl/links-issue-tracker/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/promptctl/links-issue-tracker/internal/version.Date={{ .Date }}

archives:
  - id: lit
    # name_template MUST match tools/mkmanifest's platformFromFilename parser:
    # `lit_<version>_<goos>_<goarch>.<ext>` (underscore-separated). If this
    # template changes, that parser changes in the same PR.
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    # Pin the flat-archive shape explicitly. scripts/install.sh's pre-extraction
    # validator rejects any entry containing `/` (path-traversal defense), which
    # means a wrapped-in-directory archive would be rejected as malformed.
    # Goreleaser's current default is `false`, but a default change or an
    # accidental edit here would silently desync the producer/consumer contract.
    # [LAW:single-enforcer] the producer declares the invariant the consumer's
    # validator depends on, so the consumer is verifying a *documented* shape.
    wrap_in_directory: false
    files:
      - LICENSE*
      - README*

checksum:
  # Default name: checksums.txt. mkmanifest reads this exact file.
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  # Local --snapshot invocation gets a clearly-non-release version so a
  # snapshot can never be confused with a tagged release in flight.
  version_template: "{{ incpatch .Version }}-snapshot+{{.ShortCommit}}"

# Release publishing is OWNED BY .github/workflows/release.yml, not goreleaser.
# goreleaser builds artifacts + checksums into dist/; the workflow then runs
# mkmanifest to emit release-manifest.json, and `gh release create` publishes
# everything atomically.
#
# Why split: goreleaser has no hook point between "checksums.txt exists" and
# "release is published" — we need exactly that point to invoke mkmanifest
# with the actual checksums it reads. Owning publish in release.yml puts the
# ordering under explicit control rather than a missing goreleaser hook.
#
# [LAW:single-enforcer] release.yml is the one place that knows the sequence
# build → manifest → publish. goreleaser's job ends at dist/.
release:
  disable: true

# Release notes have a single owner: `gh release create --generate-notes` in
# release.yml builds them from the PRs/commits in the tag range. goreleaser's
# own changelog is redundant with that, and `use: github` would have it call
# the GitHub API from the build container (which is given no token). Disable it
# so note generation has one owner and the build container has no API
# dependency in the real `release` path snapshot validation never exercises.
# [LAW:single-enforcer] one generator of release notes, not two.
changelog:
  disable: true
